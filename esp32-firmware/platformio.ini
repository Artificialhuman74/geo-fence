; PlatformIO Project Configuration File
;
; ESP32 GPS Geofence Alarm — reads NEO-6M/NEO-M8N GPS over UART2, pushes
; JSON fixes to Firebase over WiFi, and drives a local buzzer on command.

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3

build_flags =
    -D CORE_DEBUG_LEVEL=0
